triplestore: "Apache Jena Fuseki 5.0.0"
endpoint: "http://localhost:3030/battery/sparql"
dataset: "battery"

# Snapshot-Groesse
n_triples: 1431
n_cells: 88
n_tests: 125

# Alle 8 Klassen mit IRI und Instanzanzahl
