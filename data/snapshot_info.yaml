# Alle modellierten Relationen (Properties)
relations:
  - iri: "rdf:type"
    description: "Klassenzugehoerigkeit"
    domain: "alle"
    range: "Klassen-IRI"

  - iri: "rdfs:label"
    description: "Menschenlesbarer Name der Entitaet"
    domain: "alle"
    range: "Literal (String)"

  - iri: "hb:Property-3AHasDut"
    description: "Verknuepft Test mit der getesteten Zelle (Device Under Test)"
    domain: "Electrochemical Test"
    range: "LG INR18650 MH1"

  - iri: "hb:Property-3AHasProcedure"
    description: "Verknuepft Test mit dem eingesetzten Testverfahren"
    domain: "Electrochemical Test"
    range: "Test Procedure"

  - iri: "hb:Property-3AHasActionee"
    description: "Verknuepft Test mit der durchfuehrenden Person (als URI)"
    domain: "Electrochemical Test"
    range: "Person-URI (mit rdfs:label)"

  - iri: "hb:Property-3AHasStartDateAndTime-23aux"
    description: "Startzeitpunkt des Tests (als Literal)"
    domain: "Electrochemical Test"
    range: "Literal (Datetime)"

  - iri: "hb:Property-3AHasTemperature"
    description: "Prueftemperatur (als URI, NICHT als Literal)"
    domain: "Electrochemical Test"
    range: "URI (z.B. .../id/25 fuer 25 Grad Celsius)"

  - iri: "hb:Property-3AHasSerialNumber"
    description: "Physische Seriennummer der Zelle"
    domain: "LG INR18650 MH1"
    range: "Literal (String)"

