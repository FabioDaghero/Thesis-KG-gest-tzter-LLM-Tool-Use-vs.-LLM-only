# Scope des Snapshots
scope: "Lifecycle-Tracking LG INR18650 MH1, nur lokale Instanzen Fraunhofer ISC, kein Allgemeinwissen"

# Wichtige Quirks fuer SPARQL-Queries
quirks:
  - property: "hb:Property-3AHasTemperature"
    issue: "Liefert URI statt Literal (z.B. .../id/25)"
    workaround: "BIND(REPLACE(STR(?tempUri), '.*/','') AS ?temp) + FILTER(?temp = '25')"

  - property: "IsBasedOn"
    issue: "Wiki-Versionierungs-Property, KEINE Halbzelle-zu-Zelle-Beziehung"
    workaround: "Nicht verwenden; fachliche Ableitungen stecken nur im Label-Naming"

  - property: "hb:Property-3AHasDut"
    issue: "Richtung Test -> Cell (umgekehrt zur intuitiven Leserichtung)"
    workaround: "?test hb:Property-3AHasDut ?cell, nie andersherum"

  - property: "hb:Property-3AHasActionee"
    issue: "Person-URIs haben kein rdfs:label"
    workaround: "URIs direkt vergleichen statt ueber Labels"
