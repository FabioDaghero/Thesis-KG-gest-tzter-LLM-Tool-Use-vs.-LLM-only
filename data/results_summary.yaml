system_b_failure_taxonomy:
  wrong_type_iri:
    ids:
    - K1.9
    - K1.10
    description: LLM verwendet ElectrochemicalTest-IRI statt TestProcedure-IRI
    sparql_result: n>0 (falsche Klasse), Antwort halluziniert
  test_procedure_confusion:
    ids:
    - K3.7
    - K3.8
    - K3.9
    description: SPARQL gibt Testnamen zurueck statt Verfahrensnamen (fehlender HasProcedure-JOIN)
    sparql_result: 'n=4-5, Antwort: Testinstanz-Label statt Procedure-Label'
  sparql_empty_wrong_direction:
    ids:
    - K2.4
    - K3.4
    - K3.12
    description: 'SPARQL gibt 0 Ergebnisse: LLM behandelt Procedure-Label als Test-Label
      oder falscher JOIN'
    sparql_result: 'n=0, Antwort: null'
  overcount_no_distinct:
    ids:
    - K2.9
    - K3.3
    description: 'Zaehlabfrage ohne DISTINCT: Tests werden mehrfach gezaehlt (pro
      Actionee)'
    sparql_result: 'K2.9: n=170 statt 85; K3.3: n=1 statt 85 (anderes Problem: falsche
      Property)'
  large_list_format_failure:
    ids:
    - K3.4
    - K3.5
    - K3.6
    description: SPARQL korrekt (20-22 Bindings), LLM scheitert an JSON-Array mit
      >20 Eintraegen
    sparql_result: 'n=20-22 OK, Antwort: null'
  instability_borderline:
    ids:
    - K2.3
    - K2.12
    - K3.2
    - K3.3
    description: 'Varianz ueber 3 Runs (0-1): Grenzfall, LLM-Inferenz instabil'
    b_vals:
      K2.3: *id001
      K2.12: *id002
      K3.2: *id003
      K3.3: *id004
