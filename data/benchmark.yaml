- id: K3.3
  klasse: K3
  frage: Bei wie vielen elektrochemischen Tests haben zwei verschiedene Personen als Durchführende mitgewirkt?
  ground_truth:
    answer: 85
    expected_rows: 1
    expected_value: 85
  gold_sparql: "PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\
    PREFIX hb:   <https://healthbatt.projects01.open-semantic-lab.org/id/>\nSELECT (COUNT(DISTINCT ?test) AS ?n) WHERE {\n\
    \  ?test rdf:type hb:Category-3AOSW6f39d77241e24a33ab6d036dfac03ace ;\n        hb:Property-3AHasActionee ?a1 ;\n     \
    \   hb:Property-3AHasActionee ?a2 .\n  FILTER(?a1 != ?a2)\n}\n"
  gold_evidence:
  - ?test rdf:type hb:Category-3AOSW6f39d77241e24a33ab6d036dfac03ace
  - ?test hb:Property-3AHasActionee ?a1 und ?a2 mit FILTER(?a1 != ?a2)
  - 'COUNT(DISTINCT ?test) — Ergebnis: 1 Zeile mit Wert 85'
  paraphrase_group: null
  neg_type: null
  neg_reason: null
  ref_query: app:sparql-k3
- id: N1
  klasse: N
  frage: Welche Nennspannung hat die Zelle 'healthbatt_PM1'?
  ground_truth:
    answer: nicht im Wissensgraph
    expected_n: 0
  gold_sparql: "PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\nSELECT * WHERE {\n  ?cell rdfs:label \"healthbatt_PM1\"\
    \ .\n}\n"
  gold_evidence:
  - Entitaet 'healthbatt_PM1' nicht im Snapshot vorhanden -> 0 Treffer
  - Nennspannung ist kein Property im Schema (kein hb:Property-3AHasNominalVoltage)
  paraphrase_group: null
  neg_type: missing_attribute
  neg_reason: Die Zelle 'healthbatt_PM1' existiert im KG (Originalschreibweise des rdfs:label), aber 'Nennspannung' ist kein
    modelliertes Property im Schema
  ref_query: app:sparql-n
