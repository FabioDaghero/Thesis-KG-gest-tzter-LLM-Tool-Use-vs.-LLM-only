# Benchmark v0 (Pilot, 12 Fragen)
# Felder: id, klasse (K1-K3, N), frage, ground_truth (answer,
#   expected_n bzw. expected_rows/expected_value), gold_sparql,
#   gold_evidence, paraphrase_group, neg_type, neg_reason
- id: K1.1
  klasse: K1
  frage: "Welche Procedure wurde für den Test 'Aging_MT_23' verwendet?"
  ground_truth:
    answer: "hartm_HealthBatt_Cycling"
    expected_n: 1
  gold_sparql: |
    PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    PREFIX hb:   <https://healthbatt.projects01.open-semantic-lab.org/id/>
    SELECT ?procLabel WHERE {
      ?test rdfs:label "Aging_MT_23" ;
            hb:Property-3AHasProcedure ?proc .
      ?proc rdfs:label ?procLabel .
    }
  gold_evidence:
    - "?test rdfs:label 'Aging_MT_23'"
    - "?test hb:Property-3AHasProcedure ?proc"
    - "?proc rdfs:label 'hartm_HealthBatt_Cycling'"
  paraphrase_group: null
  neg_type: null
  neg_reason: null
  ref_query: app:sparql-k1

