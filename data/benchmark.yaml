- id: N3
  klasse: N
  frage: Welche Tests gibt es zu Tesla Model 3-Zellen?
  ground_truth:
    answer: außerhalb des Themenbereichs
    expected_n: 0
  gold_sparql: "PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\nSELECT ?label WHERE {\n  ?x rdfs:label ?label .\n  FILTER(REGEX(?label,\
    \ \"Tesla\", \"i\") || REGEX(?label, \"Model 3\", \"i\"))\n}\n"
  gold_evidence:
  - REGEX-Suche auf alle Labels -> 0 Treffer (nur LG INR18650 MH1 im Snapshot)
  paraphrase_group: null
  neg_type: out_of_scope
  neg_reason: Tesla Model 3 ausserhalb des Scope der Battery Knowledge Base (nur LG INR18650 MH1 des Fraunhofer ISC erfasst)
  ref_query: app:sparql-n
