# AENDERUNGEN K3.3:
#   - Tippfehler "Aktuere" -> "Akteure" behoben
#   - "HasActionee" aus Fragetext entfernt (schema_proximity: high -> reduziert)
#   - expected_n=85 (falsch: COUNT liefert 1 Zeile mit Wert 85)
#     -> expected_rows=1, expected_value=85
- id: K3.3
  klasse: K3
  frage: "Bei wie vielen elektrochemischen Tests haben zwei verschiedene Personen als Durchführende mitgewirkt?"
  ground_truth:
    answer: 85
    expected_rows: 1
    expected_value: 85
  gold_sparql: |
    PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    PREFIX hb:   <https://healthbatt.projects01.open-semantic-lab.org/id/>
    SELECT (COUNT(DISTINCT ?test) AS ?n) WHERE {
      ?test rdf:type hb:Category-3AOSW6f39d77241e24a33ab6d036dfac03ace ;
            hb:Property-3AHasActionee ?a1 ;
            hb:Property-3AHasActionee ?a2 .
      FILTER(?a1 != ?a2)
    }
  gold_evidence:
    - "?test rdf:type hb:Category-3AOSW6f39d77241e24a33ab6d036dfac03ace"
    - "?test hb:Property-3AHasActionee ?a1 und ?a2 mit FILTER(?a1 != ?a2)"
    - "COUNT(DISTINCT ?test) — Ergebnis: 1 Zeile mit Wert 85"
  paraphrase_group: null
  neg_type: null
  neg_reason: null
  ref_query: app:sparql-k3

# N — Negativfragen (kein Ergebnis erwartet)

# N1: healthbatt_PM1 ist bewusst nicht im Snapshot (unterschiedliche Schreibweise /
#     nicht erfasste Zelle). Nennspannung ist zudem kein modelliertes Attribut im Schema.
- id: N1
  klasse: N
  frage: "Welche Nennspannung hat die Zelle 'healthbatt_PM1'?"
  ground_truth:
    answer: "nicht im Wissensgraph"
    expected_n: 0
  gold_sparql: |
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT * WHERE {
      ?cell rdfs:label "healthbatt_PM1" .
    }
  gold_evidence:
    - "Entitaet 'healthbatt_PM1' nicht im Snapshot vorhanden -> 0 Treffer"
    - "Nennspannung ist kein Property im Schema (kein hb:Property-3AHasNominalVoltage)"
  paraphrase_group: null
  neg_type: missing_attribute
  neg_reason: "Die Zelle 'healthbatt_PM1' existiert im KG (Originalschreibweise des rdfs:label), aber 'Nennspannung' ist kein modelliertes Property im Schema"
  ref_query: app:sparql-n

