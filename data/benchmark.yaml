- id: K2.1
  klasse: K2
  frage: Welche elektrochemischen Tests wurden bei 25 Grad Celsius durchgeführt?
  ground_truth:
    answer:
    - HealthBatt MT_01_Check-up V3_before
    - HealthBatt MT_02_Check-up V3_before
    - HealthBatt MT_03_Check-up V3_before
    - HealthBatt MT_04_Check-up V3_before
    - HealthBatt PM_09_CYCL1
    - HealthBatt PM_09_Check-up V6_CU1
    - HealthBatt PM_09_Check-up V6_CU2
    - HealthBatt PM_10_CYCL1
    - HealthBatt PM_10_Check-up V6_CU1
    - HealthBatt PM_10_Check-up V6_CU2
    expected_n: 10
  gold_sparql: "PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\
    PREFIX hb:   <https://healthbatt.projects01.open-semantic-lab.org/id/>\nSELECT ?testLabel WHERE {\n  ?test rdf:type hb:Category-3AOSW6f39d77241e24a33ab6d036dfac03ace\
    \ ;\n        rdfs:label ?testLabel ;\n        hb:Property-3AHasTemperature ?tempUri .\n  BIND(REPLACE(STR(?tempUri), \"\
    .*/\", \"\") AS ?temp)\n  FILTER(?temp = \"25\")\n}\nORDER BY ?testLabel\n"
  gold_evidence:
  - ?test rdf:type hb:Category-3AOSW6f39d77241e24a33ab6d036dfac03ace
  - ?test hb:Property-3AHasTemperature ?tempUri
  - BIND(REPLACE(STR(?tempUri), '.*/','') AS ?temp) — URI-zu-Literal-Konversion noetig
  - FILTER(?temp = '25')
  paraphrase_group: null
  neg_type: null
  neg_reason: null
  ref_query: app:sparql-k2
- id: K2.2
  klasse: K2
  frage: Welche Zellen sind als 'gealtert' bzw. 'aged' markiert?
  ground_truth:
    answer:
    - HealthBatt MT_03 gealtert
    - HealthBatt MT_04 aged
    expected_n: 2
  gold_sparql: "PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\
    PREFIX hb:   <https://healthbatt.projects01.open-semantic-lab.org/id/>\nSELECT ?label WHERE {\n  ?cell rdf:type hb:Category-3AOSW60482870f8fc406782f60295bf7a09e3\
    \ ;\n        rdfs:label ?label .\n  FILTER(\n    REGEX(?label, \"(^|[^a-zA-Z])gealtert\", \"i\") ||\n    REGEX(?label,\
    \ \"aged\", \"i\")\n  )\n}\nORDER BY ?label\n"
  gold_evidence:
  - ?cell rdf:type hb:Category-3AOSW60482870f8fc406782f60295bf7a09e3
  - FILTER REGEX auf rdfs:label (nicht als eigenes Tripel modelliert)
  - 'Treffer: ''HealthBatt MT_03 gealtert'', ''HealthBatt MT_04 aged'''
  paraphrase_group: null
  neg_type: null
  neg_reason: null
  ref_query: app:sparql-k2
- id: K2.3
  klasse: K2
  frage: Welche fünf Zellen haben die meisten elektrochemischen Tests? Nenne sie absteigend nach Testanzahl.
  ground_truth:
    answer:
    - HealthBatt MT_01 ungealtert
    - HealthBatt MT_02 ungealtert
    - HealthBatt MT_03 gealtert
    - HealthBatt MT_04 aged
    - HealthBatt MT_05
    expected_n: 5
  gold_sparql: "PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\
    PREFIX hb:   <https://healthbatt.projects01.open-semantic-lab.org/id/>\nSELECT ?cellLabel (COUNT(?test) AS ?testCount)\
    \ WHERE {\n  ?cell rdf:type hb:Category-3AOSW60482870f8fc406782f60295bf7a09e3 ;\n        rdfs:label ?cellLabel .\n  ?test\
    \ hb:Property-3AHasDut ?cell .\n}\nGROUP BY ?cellLabel\nORDER BY DESC(?testCount) ?cellLabel\nLIMIT 5\n"
  gold_evidence:
  - ?test hb:Property-3AHasDut ?cell — Richtung Test→Cell
  - COUNT(?test) GROUP BY ?cellLabel
  - ORDER BY DESC(?testCount) ?cellLabel — Gleichstaende alphabetisch aufgeloest
  paraphrase_group: null
  neg_type: null
  neg_reason: null
  ref_query: app:sparql-k2
- id: K3.1
  klasse: K3
  frage: Welche Procedures wurden an der Zelle 'HealthBatt MT_05' verwendet?
  ground_truth:
    answer:
    - hartm_HealthBatt_Check_Up_V7
    - feiler_Health_Batt_Check_Up_v7
    - hartm_HealthBatt_Cycling
    expected_n: 3
  gold_sparql: "PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\
    PREFIX hb:   <https://healthbatt.projects01.open-semantic-lab.org/id/>\nSELECT DISTINCT ?procLabel WHERE {\n  ?cell rdfs:label\
    \ \"HealthBatt MT_05\" .\n  ?test hb:Property-3AHasDut ?cell ;\n        hb:Property-3AHasProcedure ?proc .\n  ?proc rdfs:label\
    \ ?procLabel .\n}\nORDER BY ?procLabel\n"
  gold_evidence:
  - ?cell rdfs:label 'HealthBatt MT_05'
  - ?test hb:Property-3AHasDut ?cell — Richtung Test→Cell (umgekehrt navigieren)
  - ?test hb:Property-3AHasProcedure ?proc
  - DISTINCT — mehrere Tests koennen dieselbe Procedure verwenden
  paraphrase_group: null
  neg_type: null
  neg_reason: null
  ref_query: app:sparql-k3
